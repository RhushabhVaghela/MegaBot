name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Backend: Python tests, lint, type-check, security
  # ──────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install bandit pip-audit

      - name: Run tests with coverage
        run: |
          PYTHONPATH=. OPENCLAW_AUTH_TOKEN=test_token_12345 \
          python -m pytest tests/ -v \
            --cov=core --cov=adapters --cov=modules \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=95

      - name: Run ruff (lint + format check)
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run mypy (type checks)
        run: python -m mypy --ignore-missing-imports .

      # --- Security scanning ---
      - name: Run bandit (security lint)
        run: |
          python -m bandit -r core/ adapters/ modules/ \
            -c pyproject.toml \
            --severity-level medium \
            -f json -o bandit-report.json

      - name: Run pip-audit (dependency vulnerabilities)
        run: python -m pip_audit --strict --desc

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Frontend: TypeScript, lint, test, build
  # ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Docker: build image + Trivy scan
  # ──────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: megabot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: megabot:ci-${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
