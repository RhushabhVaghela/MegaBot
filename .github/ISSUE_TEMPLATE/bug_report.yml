name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start MegaBot with `docker-compose up`
        2. Send message via Telegram...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MegaBot is affected?
      options:
        - Core Orchestrator
        - Memory System (memU)
        - Messaging Adapter (Telegram/Discord/Signal/etc.)
        - Gateway (Cloudflare/Tailscale)
        - Security (Tirith Guard / Permissions)
        - UI Dashboard
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MegaBot version
      description: Output of `git describe --tags` or the version in pyproject.toml
      placeholder: "v1.0.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows (native)
        - Docker

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs (use `docker-compose logs megabot`).
      render: shell
